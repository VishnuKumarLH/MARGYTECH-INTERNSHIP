<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login Page</title>
        

        <style>
body{
    background-image: url(bg.png);
    background-repeat: no-repeat;
    background-size: cover;
    display: inline;
}

h2{
    color: white;
    font-weight: 900;
    font-size: 50px;
}
.container{
    width: 300px;
    height: 350px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 30px;
    margin-left: 100px;
}

input{
    width: 300px;
    height: 40px;
    margin-top: 10px;
    margin-bottom: 5px;
    border-radius: 3px;
    border: none;
    background-color: rgba(225, 219, 219, 0.489);
}

label{
    color: white;
}
button{
    width: 320px;
    height: 40px;
    margin-top: 10px;
    background-color:rgb(255, 255, 255);
    border-color: pink;
    border-radius: 10px;
    margin-top:20px;
    margin-bottom: 10px;
    color: pink;
    font-size: 15px;
    font-weight: 900;
}

button:hover{
    background-color: white;
    scale: 1.1;
    cursor: pointer;
}

a{
    margin-bottom: 10px;
    color: white;
}

.welcome{
    position: absolute;
    top: 40%;
    left: 60%;
   
}

h1{
    font-size: 60px;
    color: white;
}
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Login</h2>
            <form>
                <label>Enter Your Username</label><br>
                <input type="text" placeholder="Username" required>

                <br><label>Enter Your Password</label><br>
                <input type="password" placeholder="password" required>

                <br><a href="#">Forgot Password</a>
                <br><button>Login</button>
                <br><a href="register.html">Don't have an account</a>
            </form>
        </div>
        <div class="welcome">
            <h1>Welcome Back</h1>
        </div>
    </body>
</html>
