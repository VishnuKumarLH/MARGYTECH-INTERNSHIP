<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Registration Page</title>
        

        <style>
body{
    display: inline;
    background-image: url(bg.png);
    background-repeat: no-repeat;
    background-size: cover;
}

.container{
    width: 400px;
    height: 560px;
    position: absolute;
    right: 10%;
    
    
    display: flex;
    flex-direction: column;
    align-items: center;
   
}

h2{
    color: white;
    font-weight: 900;
    font-size: 50px;
    margin-bottom: -5px;
}

input{
    width: 400px;
    height: 40px;
    border-radius: 3px;
    border: none;
    margin-top: 10px;
    background-color: rgba(225, 219, 219, 0.489);
}

label{
    color: white;
   
}
button{
    width: 410px;
    height: 40px;
    margin-top: 10px;
    background-color: white;
    border: 1px solid skyblue;
    border-radius: 10px;
    margin-bottom: 10px;
    color: skyblue;
    font-size: 15px;
    font-weight: 900;

}

button:hover{
    background-color: white;
    cursor: pointer;
    scale: 1.1;
}

.input-item{
    margin-bottom: 20px;
}

a{
    color: white;
}

.welcome{
    position: absolute;
    top: 36%;
    left: 10%;
}

h1{
    font-size: 60px;
    color: white;
}
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Register</h2><br>
            <form>

                <div class="input-item">
                <label>Enter Your Username</label><br>
                <input type="text" placeholder="Username" required>
                </div>

                <div class="input-item"> </div>
                <label>Enter Your Email</label><br>
                <input type="email" placeholder="Email" required>
                

                <div class="input-item">
                <br><label>Enter Your password</label><br>
                <input type="password" placeholder="password" required>
                </div>

                <div class="input-item">
                <label>Repeat password</label><br>
                <input type="password" placeholder="password" required>
                </div>
                
                <br><button>Register</button>
                <br><a href="login.html">I have an account</a>
            </form>
        </div>

        <div class="welcome">
            <h1>Welcome you</h1>
        </div>
    </body>
</html>
